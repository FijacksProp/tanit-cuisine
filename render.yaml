services:
  - type: web
    runtime: python
    name: tanit-cuisine-api
    rootDir: backend
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /api/health/
    autoDeployTrigger: commit
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_REQUIRE
        value: true
      - key: DJANGO_ALLOWED_HOSTS
        value: localhost,127.0.0.1
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: true
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_FULL_NAME
        value: Tanit Admin
      - key: DJANGO_SUPERUSER_UPDATE_PASSWORD
        value: false
